# nginx proxy address - http://172.17.0.1:60132

name: nginx-proxy-manager
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      DISABLE_IPV6: 0
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: nginx-proxy-manager
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    ports:
      - '80:80'
      - '443:443'
      - '172.17.0.1:60132:81'
    volumes:
      - './volumes/data/nginx-proxy-manager:/data'
      - './volumes/config/nginx-proxy-manager:/etc/letsencrypt'
    healthcheck:
      test: ['CMD', '/usr/bin/check-health']
      interval: 10s
      timeout: 3s
    extra_hosts:
      - 'host.docker.internal:172.17.0.1'
    networks:
      - nginx-proxy-manager
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://nginx-proxy-manager:81'
      - 'cloudflare.hostname=nginx-proxy-manager.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.nginx-proxy-manager.entrypoints=http'
      - 'traefik.http.routers.nginx-proxy-manager-secure.tls=true'
      - 'traefik.http.routers.nginx-proxy-manager.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.nginx-proxy-manager-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.nginx-proxy-manager.middlewares=nginx-proxy-manager-https-redirect'
      - 'traefik.http.routers.nginx-proxy-manager-secure.entrypoints=https'
      - 'traefik.http.routers.nginx-proxy-manager-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.nginx-proxy-manager-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.nginx-proxy-manager-secure.service=nginx-proxy-manager'
      - 'traefik.http.services.nginx-proxy-manager.loadbalancer.server.port=81'

networks:
  nginx-proxy-manager:
    name: nginx-proxy-manager
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
